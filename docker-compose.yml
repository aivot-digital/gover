version: '3.1'

services:

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: gover
      POSTGRES_USER: gover
      POSTGRES_DB: gover
    ports:
      - "5432:5432"
  
  minio:
    image: minio/minio
    restart: always
    environment:
      MINIO_ACCESS_KEY: gover
      MINIO_SECRET_KEY: gover_secret_key
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
  
  gover:
    image: aivot/gover
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - minio
    restart: always
    volumes:
      - ./config:/app/config:ro
    ports:
      - "8080:80"
