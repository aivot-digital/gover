spring.datasource.url=jdbc:postgresql://localhost:5432/gover
spring.datasource.username=gover
spring.datasource.password=gover

server.error.include-message=always

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL94Dialect
spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.properties.hibernate.format_sql=true

minio.url=http://<MIO_HOST>:<MIO_PORT>
minio.access=<MIO_USERNAME>
minio.secret=<MIO_PASSWORD>
minio.bucket=<MIO_BUCKET>

jwt.secret=${random.value}
jwt.expiration=604800000

smtp.host=<SMTP_HOST>
smtp.port=<SMTP_PORT>
smtp.username=<SMTP_USERNAME>
smtp.password=<SMTP_PASSWORD>
smtp.useTls=true

gover.reportMail=<ADMIN_EMAIL_ADDRESS>
