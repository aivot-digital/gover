[server]
domain = localhost:9595
root_url = http://localhost:9595/bi/
serve_from_sub_path = true

[auth.generic_oauth]
enabled = true
name = Keycloak-OAuth
allow_sign_up = true
client_id = ${OIDC_CLIENT_ID}
client_secret = ${OIDC_CLIENT_SECRET}
scopes = openid email profile offline_access roles
email_attribute_path = email
login_attribute_path = username
name_attribute_path = full_name
auth_url = ${OIDC_HOST}/realms/${OIDC_REALM}/protocol/openid-connect/auth
token_url = http://keycloak:8080/realms/${OIDC_REALM}/protocol/openid-connect/token
api_url = http://keycloak:8080/realms/${OIDC_REALM}/protocol/openid-connect/userinfo
role_attribute_path = contains(roles[*], 'admin') && 'Admin' || contains(roles[*], 'editor') && 'Editor' || 'Viewer'