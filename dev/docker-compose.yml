# -------------------------- Usage --------------------------
# Start this with: docker compose -f ./docker-compose.yml up -d
# -----------------------------------------------------------
name: gover_dev_environment

services:

  gover-database:
    image: postgres:16.11-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: gover
      POSTGRES_USER: gover
      POSTGRES_DB: gover
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - gover_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  antivirus:
    image: clamav/clamav-debian:1.5.1
    restart: unless-stopped
    ports:
      - "3310:3310"

  cache:
    image: redis:8.2.3-alpine3.22
    restart: unless-stopped
    ports:
      - "6379:6379"

  pdf-printer:
    image: gotenberg/gotenberg:8.25.0
    restart: unless-stopped
    network_mode: host
    environment:
      API_PORT: 9191

  s3-object-storage:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminpassword
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  s3-object-storage-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: on-failure
    depends_on:
      - s3-object-storage
    entrypoint: >
      /bin/sh -c "
      sleep 10 &&
      mc alias set local http://s3-object-storage:9000 admin adminpassword &&
      mc mb --ignore-existing local/gover &&
      mc admin accesskey create local/ --access-key super-access-key --secret-key super-secret-key
      "

  smtp:
    image: axllent/mailpit:v1.27.11
    restart: unless-stopped
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    volumes:
      - mailpit_data:/data
    ports:
      - "9025:8025"
      - "2025:1025"

  keycloak-database:
    image: postgres:16.11-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_DB: keycloak
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - keycloak_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  keycloak:
    image: ghcr.io/aivot-digital/keycloak-egov-plugins:26.4.5.0
    restart: unless-stopped
    depends_on:
      - keycloak-database
    command: [ 'start-dev' ]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: "8080"
      KC_HOSTNAME: "http://localhost:9595/idp"
      KC_HOSTNAME_BACKCHANNEL_DYNAMIC: "false"
      KC_HOSTNAME_DEBUG: "true"
      KC_DB: "postgres"
      KC_DB_URL: "jdbc:postgresql://keycloak-database:5432/keycloak"
      KC_DB_USERNAME: "keycloak"
      KC_DB_PASSWORD: "keycloak"
      KC_FEATURES: "transient-users,update-email,hostname:v2"

  keycloak_setup:
    image: ghcr.io/aivot-digital/keycloak-egov-plugins-setup:0.0.12
    restart: on-failure
    depends_on:
      - keycloak
    environment:
      KEYCLOAK_URL: "http://keycloak:8080"
      HOSTNAME: "http://localhost:9595"
      KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD: "admin"
      KEYCLOAK_DEPLOYMENT_CLIENT_NAME: "deployment"
      KEYCLOAK_DEPLOYMENT_CLIENT_SECRET: "my-super-secret-key"
      KEYCLOAK_ADMIN_EMAIL: "mail@example.com"
      KEYCLOAK_ADMIN_USERNAME: "superuser"
      KEYCLOAK_ADMIN_PASSWORD: "My-Super-Secret-Password-No.1"
      KEYCLOAK_AVAILABILITYCHECK_ENABLED: "true"
      KEYCLOAK_AVAILABILITYCHECK_TIMEOUT: "120s"
      LOGGING_LEVEL_HTTP: "ERROR"
      SMTP_HOST: "smtp"
      SMTP_PORT: "1025"
      SMTP_USERNAME: "username"
      SMTP_PASSWORD: "my-super-secret-password"
      SMTP_FROM: "mail@example.com"
      SMTP_FROM_DISPLAY: "Mail Test"
      BACKEND_CLIENT_SECRET: "my-super-secret-key"

  message-broker:
    image: rabbitmq:4.2.1-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: adminpassword
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  reverse-proxy:
    image: caddy:2.10.2-alpine
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:Z
    ports:
      - "9595:80"

volumes:
  gover_pg_data:
  keycloak_pg_data:
  minio_data:
  mailpit_data:
  rabbitmq_data:
