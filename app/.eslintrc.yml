env:
  browser: true
  es2021: true
extends:
  - standard-with-typescript
  - plugin:react/recommended
  - google
parserOptions:
  ecmaVersion: latest
  project:
    - ./tsconfig.json
plugins:
  - react
rules:
  'template-curly-spacing':
    - 'error'
    - 'always'
  semi:
    - 'error'
    - 'always'
  'max-len':
    - 'error'
    - 240
  '@typescript-eslint/semi':
    - 'error'
    - 'always'
  'indent':
    - 'error'
    - 4
  '@typescript-eslint/indent':
    - 'error'
    - 4
  require-jsdoc: off
  '@typescript-eslint/space-before-function-paren': off
  '@typescript-eslint/comma-dangle':
    - 'error'
    - 'only-multiline'
  '@typescript-eslint/promise-function-async': off
  '@typescript-eslint/member-delimiter-style':
    - 'error'
    - multiline:
        delimiter: 'semi'
        requireLast: true
      singleline:
        delimiter: 'comma'
        requireLast: false
