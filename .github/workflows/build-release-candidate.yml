name: Build and publish a Gover release candidate

on:
  push:
    branches:
      - "patch/*"
      - "milestone/*"

env:
  JDK_VERSION: 21
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  testBackend:
    name: Test backend
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JDK_VERSION }}
          distribution: temurin
          architecture: x64

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots test

  arm64:
    name: Build and push ARM64 image
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get current date
        id: build_date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: Extract clean version tag
        id: build_tag
        run: echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            version=${{ github.ref_name }}
            buildDate=${{ steps.build_date.outputs.value }}

  amd64:
    name: Build and push AMD64 image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Get current date
        id: build_date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"
      - name: Extract clean version tag
        id: build_tag
        run: echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            version=${{ github.ref_name }}
            buildDate=${{ steps.build_date.outputs.value }}

  merge:
    name: Merge ARM64 and AMD64 images and push to registry
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    needs: [ arm64, amd64 ]
    steps:
      - name: Extract clean version tag
        id: clean_tag
        run: echo "value=${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish manifest on GitHub Container Registry
        run: |
          docker buildx imagetools create \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }}-arm64 \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }}-amd64 \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc-${{ steps.build_tag.outputs.value }} \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:rc
