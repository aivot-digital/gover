name: Check if changelog is updated

on:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  testChangelogChanged:
    name: Check if changelog is updated
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check if changelog is updated
        run: |
          if git diff --name-only ${{ github.event.repository.default_branch }} ${{ github.sha }} | grep -q 'CHANGELOG.md'; then
              echo "Changelog has been updated.";
          else
              echo "Changelog has not been updated. Please update CHANGELOG.md before merging.";
              exit 1;
          fi
