name: Check a pull request

on:
  push:
    branches:
      - "main"
    tags:
      - "*"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - "milestone/*"
      - "patch/*"
      - "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IS_ALPHA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref != 'main' }}
  IS_BETA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref == 'main' }}
  IS_RELEASE: ${{ github.event_name == 'push' }}

jobs:
  testBackend:
    name: Test backend
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          architecture: x64

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots test

  testChangelogChanged:
    name: Check if changelog is updated
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if changelog is updated
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q 'CHANGELOG.md'; then
              echo "Changelog has been updated.";
          else
              echo "Changelog has not been updated. Please update CHANGELOG.md before merging.";
              exit 1;
          fi

  prepareBuildVars:
    name: Prepare release candidate build variables
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.build_date.outputs.value }}
      build_version: ${{ steps.build_version.outputs.value }}
    steps:
      - name: Get current date
        id: build_date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract clean version tag
        id: build_version
        run: |
          if ${{ github.event_name == 'pull_request' }}; then
            if ${{ github.head_ref == 'main' }}; then
              echo "value=beta-${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
            else
              echo "value=alpha-${GITHUB_REF##*/}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  buildArm64Image:
    name: Build and push ARM64 image
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04-arm
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            buildDate=${{ env.BUILD_DATE }}
            version=${{ env.BUILD_VERSION }}

  buildAmd64Image:
    name: Build and push AMD64 image
    if: github.event.pull_request.draft == false
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            buildDate=${{ env.BUILD_DATE }}
            version=${{ env.BUILD_VERSION }}

  mergeImages:
    name: Merge ARM64 and AMD64 images and push to registry
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
    needs:
      - prepareBuildVars
      - buildArm64Image
      - buildAmd64Image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish manifest on GitHub Container Registry
        run: |
          docker buildx imagetools create \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64 \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64 \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }} \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest