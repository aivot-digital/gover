name: Check a pull request

on:
  push:
    tags:
      - "*"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - "milestone/*"
      - "patch/*"
      - "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  IS_ALPHA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref != 'main' }}
  IS_BETA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref == 'main' }}
  IS_RELEASE: ${{ github.event_name == 'push' }}

jobs:
  testBackend:
    name: Test backend
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          architecture: x64

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots test

  testChangelogChanged:
    name: Check if changelog is updated
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if changelog is updated
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q 'CHANGELOG.md'; then
              echo "Changelog has been updated.";
          else
              echo "Changelog has not been updated. Please update CHANGELOG.md before merging.";
              exit 1;
          fi

  prepareBuildVars:
    name: Prepare release candidate build variables
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.build_date.outputs.value }}
      build_version: ${{ steps.build_version.outputs.value }}
    steps:
      - name: Get current date
        id: build_date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract clean version tag
        id: build_version
        run: |
          if ${{ github.event_name == 'pull_request' }}; then
            if ${{ github.event.pull_request.base.ref == 'main' }}; then
              SOURCE_BRANCH=${{ github.event.pull_request.head.ref }}
              echo "value=${SOURCE_BRANCH##*/}-beta-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            else
              TARGET_BRANCH=${{ github.event.pull_request.base.ref }}
              echo "value=${TARGET_BRANCH##*/}-alpha-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  generateSbom:
    name: Generate SBOMs
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    needs:
      - testBackend
      - testChangelogChanged
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: ./app
        run: npm install

      - name: Install cyclonedx-bom locally
        working-directory: ./app
        run: npm install @cyclonedx/cyclonedx-npm

      - name: Generate SBOM for frontend
        working-directory: ./app
        run: npx @cyclonedx/cyclonedx-npm --output-file sbom-frontend.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Generate SBOM for backend
        run: |
          mvn org.cyclonedx:cyclonedx-maven-plugin:2.7.9:makeAggregateBom

      - name: Install cyclonedx-cli
        run: |
          curl -sSL https://github.com/CycloneDX/cyclonedx-cli/releases/latest/download/cyclonedx-linux-x64 -o cyclonedx
          chmod +x cyclonedx
          sudo mv cyclonedx /usr/local/bin/

      - name: Merge SBOMs into one
        run: |
          cyclonedx merge \
            --input-files app/sbom-frontend.json,target/bom.json \
            --output-file sbom-full.json

      - name: Copy SBOM to public directory
        run: mv sbom-full.json app/public/sbom.json

      - name: Upload sbom for later use
        uses: actions/upload-artifact@v4
        with:
          name: sbom-json
          path: app/public/sbom.json

  buildArm64Image:
    name: Build and push ARM64 image
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04-arm
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
      - generateSbom
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download sbom.json
        uses: actions/download-artifact@v4
        with:
          name: sbom-json
          path: app/public

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            BUILD_DATE=${{ env.BUILD_DATE }}

  buildAmd64Image:
    name: Build and push AMD64 image
    if: github.event.pull_request.draft == false
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
      - generateSbom
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download sbom.json
        uses: actions/download-artifact@v4
        with:
          name: sbom-json
          path: app/public

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            BUILD_DATE=${{ env.BUILD_DATE }}

  mergeImages:
    name: Merge ARM64 and AMD64 images and push to registry
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
    needs:
      - prepareBuildVars
      - buildArm64Image
      - buildAmd64Image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish manifest on GitHub Container Registry
        run: |
          docker buildx imagetools create \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64 \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64 \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }} \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest