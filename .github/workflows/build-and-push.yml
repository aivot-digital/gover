name: Check a pull request

on:
  push:
    tags:
      - "*"

  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    branches:
      - "milestone/*"
      - "patch/*"
      - "main"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PR_NUMBER: ${{ github.event.pull_request.number }}
  IS_ALPHA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref != 'main' }}
  IS_BETA_RELEASE: ${{ github.event_name == 'pull_request' && github.head_ref == 'main' }}
  IS_RELEASE: ${{ github.event_name == 'push' }}

jobs:
  testBackend:
    name: Test backend
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          architecture: x64

      - name: Build with Maven
        run: mvn --batch-mode --update-snapshots test

  testChangelogChanged:
    name: Check if changelog is updated
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if changelog is updated
        run: |
          if git diff --name-only HEAD^1 HEAD | grep -q 'CHANGELOG.md'; then
              echo "Changelog has been updated.";
          else
              echo "Changelog has not been updated. Please update CHANGELOG.md before merging.";
              exit 1;
          fi

  prepareBuildVars:
    name: Prepare release candidate build variables
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    outputs:
      build_date: ${{ steps.build_date.outputs.value }}
      build_version: ${{ steps.build_version.outputs.value }}
    steps:
      - name: Get current date
        id: build_date
        run: echo "value=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Extract clean version tag
        id: build_version
        run: |
          if ${{ github.event_name == 'pull_request' }}; then
            if ${{ github.event.pull_request.base.ref == 'main' }}; then
              SOURCE_BRANCH=${{ github.event.pull_request.head.ref }}
              echo "value=${SOURCE_BRANCH##*/}-beta-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            else
              TARGET_BRANCH=${{ github.event.pull_request.base.ref }}
              echo "value=${TARGET_BRANCH##*/}-alpha-${PR_NUMBER}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

  generateSbom:
    name: Generate SBOMs and verify license compliance
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
    env:
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Inject release version into package.json
        working-directory: ./app
        run: |
          echo "Using Gover version: ${{ env.BUILD_VERSION }}"
          jq --arg version "${{ env.BUILD_VERSION }}" '.version = $version' package.json > tmp.$$.json && mv tmp.$$.json package.json

      - name: Install frontend dependencies
        working-directory: ./app
        run: npm install

      - name: Install mail-template dependencies
        working-directory: ./mails
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: temurin

      - name: Inject release version into backend (pom.xml)
        working-directory: ./
        run: |
          echo "Using Gover version: ${{ env.BUILD_VERSION }}"
          mvn versions:set -DnewVersion=${{ env.BUILD_VERSION }} -DgenerateBackupPoms=false

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Ensure sbom folder exists
        run: mkdir -p app/public/sbom

      - name: Generate SPDX and CycloneDX for frontend
        run: |
          syft ./app -o spdx-json > app/public/sbom/sbom.spdx.frontend.json
          syft ./app -o cyclonedx-json@1.5 > app/public/sbom/sbom.cyclonedx.frontend.json

      - name: Generate SPDX and CycloneDX for mail templates
        run: |
          syft ./mails -o spdx-json > app/public/sbom/sbom.spdx.mails.json
          syft ./mails -o cyclonedx-json@1.5 > app/public/sbom/sbom.cyclonedx.mails.json

      - name: Generate SPDX and CycloneDX for backend
        run: |
          syft . --exclude ./app --exclude ./mails --exclude ./.github -o spdx-json > app/public/sbom/sbom.spdx.backend.json
          syft . --exclude ./app --exclude ./mails --exclude ./.github -o cyclonedx-json@1.5 > app/public/sbom/sbom.cyclonedx.backend.json

      - name: Generate combined SPDX and CycloneDX SBOMs
        run: |
          syft . --exclude ./.github -o spdx-json > app/public/sbom/sbom.spdx.json
          syft . --exclude ./.github -o cyclonedx-json@1.5 > app/public/sbom/sbom.cyclonedx.json

      - name: Remove irrelevant file components from all SPDX and CycloneDX JSONs
        run: |
          for file in app/public/sbom/*.json; do
            echo "Cleaning $file ..."
            jq 'if .components then .components |= map(select(.type != "file")) else . end' "$file" > "$file.cleaned"
            mv "$file.cleaned" "$file"
          done

      - name: Generate extended manifest.json with SBOM metadata
        run: |
          cat <<EOF > app/public/sbom/manifest.json
          {
            "name": "gover",
            "version": "${{ env.BUILD_VERSION }}",
            "commit": "${{ github.sha }}",
            "buildDate": "${{ env.BUILD_DATE }}",
            "sboms": [
              {
                "format": "CycloneDX",
                "version": "1.5",
                "files": [
                  "sbom.cyclonedx.json",
                  "sbom.cyclonedx.xml"
                ]
              },
              {
                "format": "SPDX",
                "version": "2.3",
                "files": [
                  "sbom.spdx.json",
                  "sbom.spdx.tag"
                ]
              }
            ],
            "reports": [
              "licenses.csv",
              "licenses.txt"
            ]
          }
          EOF

      - name: Generate license reports (CSV and TXT)
        run: python3 .github/scripts/generate_license_reports.py

      - name: Run license compliance check
        id: license-check
        run: |
          python3 .github/scripts/check_licenses.py || true

      - name: Post or update license compliance comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('license_report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const existing = comments.find(comment =>
              comment.body.includes('<!-- license-check -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                comment_id: existing.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

      - name: Upload SBOM bundle as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-bundle
          path: app/public/sbom/

  buildArm64Image:
    name: Build and push ARM64 image
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04-arm
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
      - generateSbom
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download SBOM bundle
        uses: actions/download-artifact@v4
        with:
          name: sbom-bundle
          path: app/public/sbom/

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            BUILD_DATE=${{ env.BUILD_DATE }}

  buildAmd64Image:
    name: Build and push AMD64 image
    if: github.event.pull_request.draft == false
    needs:
      - testBackend
      - testChangelogChanged
      - prepareBuildVars
      - generateSbom
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_DATE: ${{ needs.prepareBuildVars.outputs.build_date }}
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download SBOM bundle
        uses: actions/download-artifact@v4
        with:
          name: sbom-bundle
          path: app/public/sbom/

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # Disable provenance to avoid unknown/unknown
          sbom: false       # Disable sbom to avoid unknown/unknown
          build-args: |
            BUILD_VERSION=${{ env.BUILD_VERSION }}
            BUILD_NUMBER=${{ env.BUILD_NUMBER }}
            BUILD_DATE=${{ env.BUILD_DATE }}

  mergeImages:
    name: Merge ARM64 and AMD64 images and push to registry
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      BUILD_VERSION: ${{ needs.prepareBuildVars.outputs.build_version }}
    needs:
      - prepareBuildVars
      - buildArm64Image
      - buildAmd64Image
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and publish manifest on GitHub Container Registry
        run: |
          docker buildx imagetools create \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-arm64 \
          --append ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }}-amd64 \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.BUILD_VERSION }} \
          --tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest